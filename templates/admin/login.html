<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LatijnAI Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="auth-container">
    <h1 class="logo-title">LatijnAI Admin</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <input type="password" name="password" placeholder="Admin wachtwoord" autofocus required>
        <button type="submit">Inloggen</button>
    </form>
</div>
</body>
</html>
