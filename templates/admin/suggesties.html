<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggesties — LatijnAI Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .suggestie-kaart {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            background: #fff;
        }
        .suggestie-kaart strong { font-size: 1.1rem; }
        .suggestie-kaart code {
            background: #f0ebe4;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .knop-groen {
            background: #3B6D11;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        .knop-rood {
            background: #A32D2D;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <h1 class="logo-title">Suggesties</h1>
    <a href="{{ url_for('admin_panel') }}" style="color: var(--bruin-donker);">← Terug naar panel</a>
    <br><br>
    {% if suggesties %}
        {% for s in suggesties %}
        <div class="suggestie-kaart">
            <strong>{{ s.grondwoord }}</strong>
            <span style="color:#888; font-size:0.85rem; margin-left:8px;">door {{ s.username }}</span>
            <br><br>
            Veld: <code>{{ s.veld }}</code><br>
            Huidig: <code>{{ s.huidige_waarde or '(leeg)' }}</code><br>
            Suggestie: <code>{{ s.voorgestelde_waarde }}</code><br>
            <br>
            <form method="POST" action="{{ url_for('admin_suggestie_verwerken', suggestie_id=s.id) }}" style="display:inline">
                <input type="hidden" name="actie" value="goedkeuren">
                <button type="submit" class="knop-groen">✓ Goedkeuren</button>
            </form>
            <form method="POST" action="{{ url_for('admin_suggestie_verwerken', suggestie_id=s.id) }}" style="display:inline">
                <input type="hidden" name="actie" value="afwijzen">
                <button type="submit" class="knop-rood">✗ Afwijzen</button>
            </form>
        </div>
        {% endfor %}
    {% else %}
        <p>Geen open suggesties.</p>
    {% endif %}
</div>
</body>
</html>
