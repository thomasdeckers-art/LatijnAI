{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <h1 class="logo-title">LatijnAI</h1>
    <p class="tagline">Leer Latijn zoals een Caesar</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <input type="text" name="username" placeholder="Gebruikersnaam" autofocus required>
        <input type="password" name="password" placeholder="Wachtwoord" required>
        <button type="submit">Inloggen</button>
    </form>
    <p class="switch">Nog geen account? <a href="{{ url_for('register') }}">Registreer hier</a></p>
</div>
{% endblock %}
